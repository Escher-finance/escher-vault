# Based on https://github.com/actions-rs/example/blob/master/.github/workflows/quickstart.yml
on: [push, pull_request]
name: CI
jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: wasm32-unknown-unknown
          components: rust-src, rustfmt, clippy
      # - name: Run tests
      #   run: cargo test --locked --package cw4626-escher
      #   env:
      #     RUST_BACKTRACE: 1
      - name: Compile WASM contract (cw4626-escher)
        run: cargo build --release --target wasm32-unknown-unknown -p cw4626-escher --lib
        env:
          RUSTFLAGS: "-C link-arg=-s"
  lints:
    name: Lints
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: wasm32-unknown-unknown
          components: rust-src, rustfmt, clippy
      - name: Run cargo fmt
        run: cargo fmt --package cw4626-escher -- --check
      - name: Run cargo clippy
        run: cargo clippy --package cw4626-escher -- -D warnings
